name: Threads Daily Report and Publish

on:
  schedule:
    # 1. 오전 07:30 (KST) -> UTC 22:30 (전날)
    - cron: '30 22 * * *'
    # 2. 오후 16:05 (KST) -> UTC 07:05 (당일)
    - cron: '05 07 * * *'
  workflow_dispatch: # 언제든 수동으로 실행하고 싶을 때 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          MY_SLACK_ID: ${{ secrets.MY_SLACK_ID }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python publish_threads.py
