name: Threads Report and Publish

on:
  schedule:
    # --- 오전 세션 ---
    # 1. 오전 07:30 (KST) -> 리포트 발송 + 기존 승인건 발행
    - cron: '30 22 * * *' 
    # 2. 오전 07:40 (KST) -> 10분 뒤 "확인 사격" (방금 누른 ✅ 처리)
    - cron: '40 22 * * *'

    # --- 오후 세션 ---
    # 3. 오후 16:05 (KST) -> 리포트 발송 + 오전/낮 승인건 발행
    - cron: '05 07 * * *'
    # 4. 오후 16:15 (KST) -> 10분 뒤 "확인 사격" (방금 누른 ✅ 처리)
    - cron: '15 07 * * *'

  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        env:
          # 슬랙 인증 토큰
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          # [수정됨] 리포트가 전송되고 승인(✅)을 확인할 채널 ID
          REPORT_CHANNEL_ID: ${{ secrets.REPORT_CHANNEL_ID }}
          # 원본 로그 데이터가 쌓이는 채널 ID
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          # 스레드 API 관련 환경변수
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python publish_threads.py
