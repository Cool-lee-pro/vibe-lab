name: Daily Threads Review Request

on:
  schedule:
    - cron: '5 7 * * *'   # 매일 KST 16:05 (UTC 07:05)
    - cron: '30 23 * * *'  # 매일 KST 08:30 (UTC 23:30)
    - cron: '30 00 * * *'  # 매일 KST 09:30 (UTC 00:30)
  workflow_dispatch: 

env:
  # Node.js 20 만료 경고를 해결하기 위해 최신 버전 사용 강제
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-logger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          MY_SLACK_ID: ${{ secrets.MY_SLACK_ID }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python publish_threads.py
