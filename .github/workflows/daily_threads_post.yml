name: Daily Threads Review Request

on:
  schedule:
    # 1. 오전 7시 30분 (KST) -> UTC 기준 전날 22:30
    - cron: '30 22 * * *'
    # 2. 오후 4시 05분 (KST) -> UTC 기준 당일 07:05
    - cron: '05 07 * * *'
  workflow_dispatch: # 이건 '수동 실행' 버튼을 위해 남겨두세요!

env:
  # Node.js 20 만료 경고를 해결하기 위해 최신 버전 사용 강제
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-logger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          MY_SLACK_ID: ${{ secrets.MY_SLACK_ID }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python publish_threads.py
